<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BMI Calculator - FitPulse</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/bmi.css" />
</head>
<body>

  <div id="header-placeholder"></div>

  <!-- Hero -->
  <section class="text-center py-5">
    <h1 class="fw-bold text-white">BMI <span class="text-danger">Calculator</span></h1>
    <p class="text-secondary">Check your Body Mass Index and get health recommendations</p>
  </section>

  <main class="container pb-5">
    <div class="row g-4">

      <!-- Form -->
      <div class="col-md-6">
        <div class="card p-4">

          <h6 class="text-danger text-uppercase mb-4">Enter Your Details</h6>

          <label class="text-secondary small mb-1">Gender</label>
          <div class="d-flex gap-2 mb-3">
            <input type="radio" class="btn-check" name="gender" id="male" value="male" checked />
            <label class="btn btn-outline-danger w-50" for="male">Male</label>
            <input type="radio" class="btn-check" name="gender" id="female" value="female" />
            <label class="btn btn-outline-danger w-50" for="female">Female</label>
          </div>

          <label class="text-secondary small mb-1">Weight (kg)</label>
          <input type="number" class="form-control mb-3" id="weight" placeholder="e.g. 70" />

          <label class="text-secondary small mb-1">Height (cm)</label>
          <input type="number" class="form-control mb-4" id="height" placeholder="e.g. 175" />

          <button id="calcBtn" class="btn btn-danger w-100 fw-bold">Calculate BMI</button>

        </div>
      </div>

      <!-- Result -->
      <div class="col-md-6">
        <div class="card p-4 h-100">

          <h6 class="text-danger text-uppercase mb-4">Your Result</h6>

          <div id="bmiResult" class="d-flex flex-column align-items-center justify-content-center text-center flex-grow-1">
            <p class="text-secondary">Fill in your details and click Calculate</p>
          </div>

          <div id="bmiRecommendation" class="mt-3 p-3 rounded border-start border-danger border-3 small text-secondary d-none"></div>

        </div>
      </div>

      <!-- Scale -->
      <div class="col-12">
        <div class="card p-4">

          <h6 class="text-danger text-uppercase mb-3">BMI Scale</h6>

          <div class="row g-3 text-center">
            <div class="col-6 col-md-3">
              <div class="scale-item underweight rounded p-3">
                <small class="text-secondary d-block">Below 18.5</small>
                <strong style="color:#5aabff;">Underweight</strong>
              </div>
            </div>
            <div class="col-6 col-md-3">
              <div class="scale-item normal rounded p-3">
                <small class="text-secondary d-block">18.5 – 24.9</small>
                <strong style="color:#4ade80;">Normal</strong>
              </div>
            </div>
            <div class="col-6 col-md-3">
              <div class="scale-item overweight rounded p-3">
                <small class="text-secondary d-block">25 – 29.9</small>
                <strong style="color:#fbbf24;">Overweight</strong>
              </div>
            </div>
            <div class="col-6 col-md-3">
              <div class="scale-item obese rounded p-3">
                <small class="text-secondary d-block">30 and above</small>
                <strong class="text-danger">Obese</strong>
              </div>
            </div>
          </div>

        </div>
      </div>

    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/include.js"></script>
  <script src="js/bmi.js"></script>
</body>
</html>
