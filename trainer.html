<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>IRONFORGE Trainers</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <link rel="stylesheet" href="css/trainer.css">
  <link rel="stylesheet" href="css/global.css">
</head>

<body>

  <div id="header"></div>
<!-- HERO -->

<section class="hero">

  <div class="hero-content">

    <h1>OUR <span>TRAINERS</span></h1>

    <p>
      Meet the elite coaches of IRONFORGE.
      Certified professionals helping you build strength.
    </p>

  </div>

</section>

<!-- TRAINERS -->

<section class="trainers-section">

  <div class="section-title">

    <h2>ELITE COACHES</h2>

    <p>Choose your trainer and start your transformation.</p>

  </div>

  <div class="trainers-grid" id="trainersContainer">

  </div>

</section>

<!-- MODAL -->

<div class="modal" id="bookingModal">

  <div class="modal-content">

    <h3>BOOKING CONFIRMED</h3>

    <p id="modalText"></p>

    <button class="close-btn" onclick="closeModal()">
      CLOSE
    </button>

  </div>

</div>

<div id="footer"></div>

<script src="../js/trainer.js"></script>
<script src="js/include.js"></script>
</body>
</html>
