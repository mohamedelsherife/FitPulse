<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../css/login-page.css">
  <script src="../js/login-page.js"></script>
  <title>Login Page</title>
</head>
<body>
  <div class="login-box">
    <h1>Login</h1>
    <p class="welcome-back-text">Welcome back! Please login to your account.</p>
    <form action="placeholder" method="POST">
      <p>Username</p>
      <div class="input-wrapper">
        <input type="text" name="username" placeholder="Username" required>
      </div>
      <p>Password</p>
      <div class="input-wrapper">
        <input type="password" name="password" id="passwordInput" placeholder="Password" required>
        <button type="button" class="toggle-password" onclick="togglePassword()" id="eyeBtn">
          <i class="bi bi-eye-slash" id="eyeIcon"></i>
        </button>
      </div>
      <button type="submit" class="login-btn"><a href="index.html">Login</a></button>
    </form>
    <p class="restart-password">Forgot password?</p>
    <div class="create-account">
      <p>Don't have an account?</p>
      <a href="sign-up-page.html">Sign up</a>
    </div>
  </div>
  <script src="../js/login-page.js"></script>
</body>
</html>
